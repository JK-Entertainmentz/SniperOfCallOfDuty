<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sniper Clan - CODM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0b1120;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(56, 189, 248, 0.2);
            --neon-blue: #38bdf8;
        }

        body {
            background-color: var(--bg-dark);
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .neon-text {
            color: var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue), 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 3px; }

        .sidebar-icon:hover, .sidebar-icon.active {
            border-radius: 30%;
            background-color: var(--neon-blue);
            color: var(--bg-dark);
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .mobile-hide { display: none !important; }
            .mobile-content { margin-left: 5rem; width: calc(100% - 5rem); }
        }
    </style>

    <script>
        // !! เปลี่ยน URL ด้านล่างเป็นของคุณ !!
        const API_URL = 'https://script.google.com/macros/s/AKfycbx4pnpHdHXpRxc9VAcXslZoUX_6Bw3XZOFuup5ZaEVFBPWrm3qKfSmsBXIU68c0P6qg/exec';
        const LOGO_URL = 'https://img2.pic.in.th/quality_restoration_25690621115059972.jpeg';

        // PWA Setup
        const manifestData = {
            name: "Sniper CODM", short_name: "Sniper", start_url: ".", display: "standalone",
            background_color: "#0b1120", theme_color: "#38bdf8",
            icons: [{ src: LOGO_URL, sizes: "512x512", type: "image/jpeg" }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/json' });
        const link = document.createElement('link'); link.rel = 'manifest'; link.href = URL.createObjectURL(manifestBlob);
        document.head.appendChild(link);

        const swCode = `self.addEventListener('install', e => self.skipWaiting()); self.addEventListener('activate', e => e.waitUntil(clients.claim())); self.addEventListener('fetch', e => {});`;
        const swBlob = new Blob([swCode], { type: 'application/javascript' });
        if ('serviceWorker' in navigator) navigator.serviceWorker.register(URL.createObjectURL(swBlob));
    </script>
</head>
<body class="h-screen w-screen flex items-center justify-center">

    <div id="toast" class="fixed top-5 right-5 p-4 rounded glass-panel hidden z-50 transition-opacity"></div>

    <div id="auth-container" class="w-full max-w-md p-8 glass-panel rounded-2xl flex flex-col items-center">
        <img src="https://img2.pic.in.th/quality_restoration_25690621115059972.jpeg" class="w-32 h-32 rounded-full border-4 border-cyan-400 shadow-[0_0_15px_#38bdf8] mb-6">
        <h1 class="text-3xl font-bold neon-text mb-6">SNIPER CLAN</h1>
        
        <div id="form-login" class="w-full">
            <input type="text" id="login-user" placeholder="Username" class="w-full bg-gray-800 text-white p-3 rounded mb-4 border border-gray-700 focus:border-cyan-400 outline-none">
            <input type="password" id="login-pass" placeholder="Password" class="w-full bg-gray-800 text-white p-3 rounded mb-6 border border-gray-700 focus:border-cyan-400 outline-none">
            <button onclick="handleAuth('login')" class="w-full bg-cyan-500 hover:bg-cyan-400 text-gray-900 font-bold p-3 rounded transition"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
            <div class="mt-4 flex justify-between text-sm text-gray-400">
                <button onclick="toggleAuthForm('register')" class="hover:text-cyan-400"><i class="fa-solid fa-user-plus"></i> Register</button>
                <button onclick="toggleAuthForm('reset')" class="hover:text-cyan-400"><i class="fa-solid fa-key"></i> Forgot Password?</button>
            </div>
        </div>

        <div id="form-register" class="w-full hidden">
            <input type="text" id="reg-user" placeholder="New Username" class="w-full bg-gray-800 text-white p-3 rounded mb-4 border border-gray-700 focus:border-cyan-400 outline-none">
            <input type="password" id="reg-pass" placeholder="New Password" class="w-full bg-gray-800 text-white p-3 rounded mb-6 border border-gray-700 focus:border-cyan-400 outline-none">
            <button onclick="handleAuth('register')" class="w-full bg-green-500 hover:bg-green-400 text-gray-900 font-bold p-3 rounded transition"><i class="fa-solid fa-check"></i> Create Account</button>
            <button onclick="toggleAuthForm('login')" class="mt-4 w-full text-sm text-gray-400 hover:text-cyan-400"><i class="fa-solid fa-arrow-left"></i> Back to Login</button>
        </div>

        <div id="form-reset" class="w-full hidden">
            <input type="text" id="res-user" placeholder="Your Username" class="w-full bg-gray-800 text-white p-3 rounded mb-4 border border-gray-700 focus:border-cyan-400 outline-none">
            <input type="password" id="res-pass" placeholder="New Password" class="w-full bg-gray-800 text-white p-3 rounded mb-6 border border-gray-700 focus:border-cyan-400 outline-none">
            <button onclick="handleAuth('reset')" class="w-full bg-orange-500 hover:bg-orange-400 text-gray-900 font-bold p-3 rounded transition"><i class="fa-solid fa-unlock-keyhole"></i> Reset Password</button>
            <button onclick="toggleAuthForm('login')" class="mt-4 w-full text-sm text-gray-400 hover:text-cyan-400"><i class="fa-solid fa-arrow-left"></i> Back to Login</button>
        </div>
    </div>

    <div id="main-view" class="hidden w-full h-full flex">
        
        <div class="w-20 bg-gray-900 flex flex-col items-center py-4 border-r border-gray-800 h-full z-10 absolute md:relative">
            <div id="nav-dashboard" class="sidebar-icon active w-12 h-12 rounded-[50%] bg-gray-800 flex items-center justify-center mb-4 cursor-pointer text-xl text-white shadow-lg" onclick="switchTab('dashboard')"><i class="fa-solid fa-house"></i></div>
            <div class="w-10 h-px bg-gray-700 mb-4"></div>
            <div id="nav-chat" class="sidebar-icon w-12 h-12 rounded-[50%] bg-gray-800 flex items-center justify-center mb-4 cursor-pointer text-xl text-white" onclick="switchTab('chat')"><i class="fa-solid fa-comments"></i></div>
            <div id="nav-rules" class="sidebar-icon w-12 h-12 rounded-[50%] bg-gray-800 flex items-center justify-center mb-4 cursor-pointer text-xl text-white" onclick="switchTab('rules')"><i class="fa-solid fa-scroll"></i></div>
            <div class="mt-auto sidebar-icon w-12 h-12 rounded-[50%] bg-gray-800 flex items-center justify-center cursor-pointer text-xl text-red-500" onclick="logout()"><i class="fa-solid fa-power-off"></i></div>
        </div>

        <div class="w-60 glass-panel h-full flex flex-col border-r border-gray-800 mobile-hide md:flex">
            <div class="p-4 border-b border-gray-800 font-bold neon-text flex items-center gap-2"><i class="fa-solid fa-crosshairs"></i> SNIPER CLAN</div>
            <div class="p-2 flex-1 overflow-y-auto custom-scrollbar">
                <div class="text-xs text-gray-500 uppercase font-bold mb-2 mt-2 px-2">Rooms</div>
                <div id="room-general" class="room-item p-2 rounded hover:bg-gray-700 cursor-pointer text-gray-300 flex items-center gap-2 mb-1 border-l-4 border-transparent transition-all" onclick="loadChat('general')"><i class="fa-solid fa-hashtag text-gray-500"></i> General</div>
                <div id="room-announcements" class="room-item p-2 rounded hover:bg-gray-700 cursor-pointer text-gray-300 flex items-center gap-2 border-l-4 border-transparent transition-all" onclick="loadChat('announcements')"><i class="fa-solid fa-bullhorn text-gray-500"></i> Announcements</div>
            </div>
            <div class="p-4 bg-gray-900 border-t border-gray-800 flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-cyan-500 flex items-center justify-center text-gray-900 font-bold"><i class="fa-solid fa-user"></i></div>
                <div class="text-sm">
                    <div id="current-username" class="font-bold text-white">User</div>
                    <div id="current-role" class="text-xs text-cyan-400">Member</div>
                </div>
            </div>
        </div>

        <div class="flex-1 h-full flex flex-col bg-[#0f172a] mobile-content">
            <div class="h-14 border-b border-gray-800 flex items-center px-4 font-bold text-lg glass-panel gap-2">
                <i class="fa-solid fa-folder-open text-cyan-500"></i> <span id="content-title">Dashboard</span>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar relative">
                
                <div id="view-dashboard" class="p-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div class="glass-panel p-6 rounded-xl flex items-center justify-between">
                            <div><div class="text-gray-400 text-sm">Total Members</div><div class="text-3xl font-bold neon-text" id="stat-members">--</div></div>
                            <i class="fa-solid fa-users text-4xl text-gray-700"></i>
                        </div>
                        <div class="glass-panel p-6 rounded-xl flex items-center justify-between">
                            <div><div class="text-gray-400 text-sm">Online Now</div><div class="text-3xl font-bold text-green-400" id="stat-online">--</div></div>
                            <i class="fa-solid fa-signal text-4xl text-gray-700"></i>
                        </div>
                    </div>
                </div>

                <div id="view-chat" class="hidden flex flex-col h-full absolute inset-0">
                    <div id="chat-messages" class="flex-1 overflow-y-auto custom-scrollbar p-4 flex flex-col gap-4"></div>
                    <div class="p-4 bg-gray-900 border-t border-gray-800">
                        <div class="flex items-center gap-2 bg-gray-800 rounded-lg px-4 py-2 border border-gray-700 focus-within:border-cyan-400">
                            <input type="text" id="chat-input" placeholder="Message..." class="flex-1 bg-transparent outline-none text-white px-2">
                            <button onclick="sendMessage()" class="text-cyan-500 hover:text-cyan-400 text-xl"><i class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>

                <div id="view-rules" class="hidden p-6 h-full flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-cyan-400"><i class="fa-solid fa-scale-balanced"></i> Clan Rules</h2>
                        <button id="btn-edit-rules" onclick="editRules()" class="hidden bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded text-sm text-cyan-400 border border-gray-700"><i class="fa-solid fa-pen"></i> Edit (Admin)</button>
                    </div>
                    <div id="rules-display" class="glass-panel p-6 rounded-xl flex-1 whitespace-pre-wrap text-gray-300">Loading rules...</div>
                    <textarea id="rules-editor" class="hidden glass-panel p-6 rounded-xl flex-1 w-full bg-gray-900 text-white outline-none focus:border-cyan-400 border border-transparent custom-scrollbar"></textarea>
                    <button id="btn-save-rules" onclick="saveRules()" class="hidden mt-4 bg-green-500 hover:bg-green-400 text-gray-900 font-bold p-3 rounded"><i class="fa-solid fa-floppy-disk"></i> Save Rules</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentRoom = 'general';
        let chatInterval = null;

        async function fetchAPI(data) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST', mode: 'cors', cache: 'no-cache',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (error) {
                showToast("Connection Error", "error");
                return { success: false };
            }
        }

        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            toast.innerHTML = `<i class="fa-solid ${type === 'error' ? 'fa-triangle-exclamation text-red-500' : 'fa-circle-check text-green-500'}"></i> ${msg}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function toggleAuthForm(type) {
            ['login', 'register', 'reset'].forEach(t => document.getElementById(`form-${t}`).classList.add('hidden'));
            document.getElementById(`form-${type}`).classList.remove('hidden');
        }

        async function handleAuth(action) {
            let user, pass, payload;
            
            if(action === 'login') {
                user = document.getElementById('login-user').value;
                pass = document.getElementById('login-pass').value;
                payload = { action: 'login', username: user, password: pass };
            } else if (action === 'register') {
                user = document.getElementById('reg-user').value;
                pass = document.getElementById('reg-pass').value;
                payload = { action: 'register', username: user, password: pass };
            } else {
                user = document.getElementById('res-user').value;
                pass = document.getElementById('res-pass').value;
                payload = { action: 'reset_password', username: user, newPassword: pass };
            }

            if(!user || !pass) return showToast("กรุณากรอกข้อมูลให้ครบ", "error");

            showToast("Processing...", "info");
            const res = await fetchAPI(payload);

            if (res.success) {
                showToast(res.message || "Success", "success");
                if(action === 'login') {
                    currentUser = res.user;
                    sessionStorage.setItem('user', JSON.stringify(res.user));
                    initApp();
                } else {
                    toggleAuthForm('login');
                }
            } else {
                showToast(res.message, "error");
            }
        }

        function initApp() {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            document.getElementById('current-username').innerText = currentUser.username;
            document.getElementById('current-role').innerText = currentUser.role;

            if(['Admin', 'Clan Leader'].includes(currentUser.role)) {
                document.getElementById('btn-edit-rules').classList.remove('hidden');
            }
            switchTab('dashboard');
        }

        function logout() {
            sessionStorage.removeItem('user');
            currentUser = null;
            if(chatInterval) clearInterval(chatInterval);
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('auth-container').classList.remove('hidden');
            toggleAuthForm('login');
        }

        function switchTab(tab) {
            // ซ่อนทุกหน้า
            ['dashboard', 'chat', 'rules'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                document.getElementById(`nav-${t}`).classList.remove('active');
            });
            // แสดงหน้าที่เลือก
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`nav-${tab}`).classList.add('active');
            
            // เคลียร์ Timer ของแชทเสมอเมื่อออกจากหน้าแชท
            if(chatInterval) clearInterval(chatInterval);

            if (tab === 'dashboard') {
                document.getElementById('content-title').innerText = 'Dashboard';
                loadDashboardStats();
            } else if (tab === 'chat') {
                // จำห้องล่าสุดที่เคยเข้าไว้
                loadChat(currentRoom, true);
            } else if (tab === 'rules') {
                document.getElementById('content-title').innerText = 'Clan Rules';
                loadRules();
            }
        }

        async function loadDashboardStats() {
            const res = await fetchAPI({ action: 'get_dashboard' });
            if(res.success) {
                document.getElementById('stat-members').innerText = res.stats.members;
                document.getElementById('stat-online').innerText = res.stats.online;
            }
        }

        async function loadChat(room, forceLoad = false) {
            // ป้องกันการโหลดซ้ำหากผู้ใช้กดห้องเดิมซ้ำๆ
            if (!forceLoad && currentRoom === room && !document.getElementById('view-chat').classList.contains('hidden')) return;
            
            currentRoom = room;
            document.getElementById('content-title').innerText = `Room: #${room}`;
            
            // 1. เคลียร์ Timer ทันทีเพื่อป้องกัน API สแปมซ้อนทับกัน
            if (chatInterval) clearInterval(chatInterval);
            
            // 2. ล้างหน้าจอแชทเก่า และใส่ Loading UI
            const box = document.getElementById('chat-messages');
            box.innerHTML = '<div class="flex justify-center items-center h-full text-cyan-400"><i class="fa-solid fa-circle-notch fa-spin text-3xl"></i></div>';

            // 3. จัดการ Active State แถบสีด้านซ้ายให้รู้ว่าอยู่ห้องไหน
            document.querySelectorAll('.room-item').forEach(el => {
                el.classList.remove('bg-gray-700', 'border-cyan-500');
                el.classList.add('border-transparent');
            });
            const activeRoom = document.getElementById(`room-${room}`);
            if(activeRoom) {
                activeRoom.classList.remove('border-transparent');
                activeRoom.classList.add('bg-gray-700', 'border-cyan-500');
            }

            // 4. ดึงข้อมูลใหม่ และเริ่ม Timer ใหม่
            await fetchMessages();
            chatInterval = setInterval(fetchMessages, 2000);
        }

        async function fetchMessages() {
            const res = await fetchAPI({ action: 'get_chat', room: currentRoom });
            if (res.success) {
                const box = document.getElementById('chat-messages');
                const wasAtBottom = box.scrollHeight - box.scrollTop <= box.clientHeight + 50;
                
                let newHtml = '';
                if(res.messages.length === 0) {
                    newHtml = '<div class="text-center text-gray-500 mt-10">ยังไม่มีข้อความในห้องนี้ เริ่มทักทายกันเลย!</div>';
                } else {
                    res.messages.forEach(msg => {
                        const time = new Date(msg.timestamp).toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
                        const isMe = msg.sender === currentUser.username;
                        const isAdmin = ['Admin', 'Clan Leader'].includes(currentUser.role);
                        
                        newHtml += `
                            <div class="flex gap-3 hover:bg-gray-800 p-2 rounded transition group">
                                <div class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center text-cyan-400 font-bold shrink-0"><i class="fa-solid fa-user"></i></div>
                                <div class="flex-1">
                                    <div class="flex items-baseline gap-2">
                                        <span class="font-bold ${isMe ? 'text-cyan-400' : 'text-gray-300'}">${msg.sender}</span>
                                        <span class="text-xs text-gray-500">${time}</span>
                                    </div>
                                    <div class="text-gray-200 mt-1">${msg.message}</div>
                                </div>
                                ${isAdmin ? `<button onclick="deleteMessage('${msg.id}')" class="opacity-0 group-hover:opacity-100 text-red-500 hover:text-red-400 transition px-2"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                            </div>
                        `;
                    });
                }
                
                box.innerHTML = newHtml;
                if (wasAtBottom) box.scrollTop = box.scrollHeight;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;
            
            input.value = '';
            await fetchAPI({ action: 'post_chat', room: currentRoom, sender: currentUser.username, message: text });
            fetchMessages();
        }

        async function deleteMessage(id) {
            if(!confirm("ต้องการลบข้อความนี้ใช่หรือไม่?")) return;
            await fetchAPI({ action: 'delete_chat', messageId: id });
            fetchMessages();
        }

        document.getElementById('chat-input').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

        async function loadRules() {
            const res = await fetchAPI({ action: 'get_rules' });
            if(res.success) {
                document.getElementById('rules-display').innerText = res.content;
                document.getElementById('rules-editor').value = res.content;
            }
        }

        function editRules() {
            document.getElementById('rules-display').classList.add('hidden');
            document.getElementById('rules-editor').classList.remove('hidden');
            document.getElementById('btn-save-rules').classList.remove('hidden');
            document.getElementById('btn-edit-rules').classList.add('hidden');
        }

        async function saveRules() {
            const content = document.getElementById('rules-editor').value;
            showToast("Saving...", "info");
            const res = await fetchAPI({ action: 'save_rules', content: content });
            if(res.success) {
                showToast("บันทึกกฎเรียบร้อย", "success");
                document.getElementById('rules-display').innerText = content;
                document.getElementById('rules-display').classList.remove('hidden');
                document.getElementById('rules-editor').classList.add('hidden');
                document.getElementById('btn-save-rules').classList.add('hidden');
                document.getElementById('btn-edit-rules').classList.remove('hidden');
            }
        }

        window.onload = () => {
            const saved = sessionStorage.getItem('user');
            if (saved) {
                currentUser = JSON.parse(saved);
                initApp();
            }
        }
    </script>
</body>
</html>
